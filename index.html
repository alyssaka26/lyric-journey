<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>词旅 · Lyric Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1f2b;
    --ink-soft:#5a6273;
    --paper:#ffffff;
    --paper-deep:#f4f6fa;
    --accent:#c2603f;
    --accent-2:#3b6ea5;
    --gold:#caa45a;
    --card:#fbf8f1;
    --line:rgba(26,31,43,.12);
    --shadow:rgba(40,50,70,.16);
    --dot:rgba(100,150,220,.42);   /* blue marker dot tint */
    /* 纸质歌词卡：米色纸 + 墨蓝字 */
    --paper-card:#f0ece0;
    --paper-card-hi:#f6f2e7;
    --ink-blue:#2b5ba8;
    --ink-blue-soft:#5d7fb5;
  }
  [data-theme="dark"]{
    --ink:#eceff5;
    --ink-soft:#9aa4b8;
    --paper:#0b0e14;
    --paper-deep:#070910;
    --accent:#e0794f;
    --accent-2:#6fa8dc;
    --gold:#d8b86a;
    --card:#171c27;
    --line:rgba(236,239,245,.12);
    --shadow:rgba(0,0,0,.5);
    --dot:rgba(120,170,235,.55);
    --paper-card:#1c2433;
    --paper-card-hi:#222c3d;
    --ink-blue:#8fb4e8;
    --ink-blue-soft:#6b8bc0;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:"Noto Sans SC",sans-serif;
    background:radial-gradient(120% 90% at 50% 0%, var(--paper) 0%, var(--paper-deep) 80%);
    color:var(--ink);overflow:hidden;
    transition:background .6s ease,color .6s ease;
  }
  #app{position:relative;width:100vw;height:100vh;height:100dvh;overflow:hidden}

  .topbar{
    position:absolute;top:0;left:0;right:0;z-index:40;
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 22px;pointer-events:none;
    transition:opacity .35s ease;
  }
  /* 进入二级页时隐藏一级页的品牌/主题栏，避免与二级页标题栏重叠 */
  body.region-open .topbar{opacity:0;pointer-events:none}
  body.region-open .topbar *{pointer-events:none}
  .brand{pointer-events:auto;display:flex;flex-direction:column;line-height:1}
  .brand .zh{font-family:"Noto Serif SC",serif;font-weight:700;font-size:22px;letter-spacing:.18em}
  .brand .en{
    font-family:"Cormorant Garamond",serif;font-style:italic;font-size:13px;
    letter-spacing:.32em;color:var(--ink-soft);margin-top:3px;text-transform:uppercase;
  }
  /* 胶囊滑块式深浅模式开关（参考 pill toggle 组件） */
  .theme-btn{
    pointer-events:auto;cursor:pointer;
    box-sizing:border-box;position:relative;
    display:flex;align-items:center;
    width:64px;height:32px;padding:4px;
    border-radius:9999px;
    background:var(--paper);
    border:1px solid var(--line);
    transition:background .3s ease,border-color .3s ease;
    box-shadow:0 4px 14px var(--shadow);
    flex:0 0 auto;
  }
  /* 滑动的高亮圆，浅色在左、深色滑到右 */
  .theme-btn::before{
    content:"";position:absolute;top:4px;left:4px;
    width:24px;height:24px;border-radius:50%;
    background:var(--paper-deep);
    transition:transform .3s ease,background .3s ease;
    z-index:0;
  }
  [data-theme="dark"] .theme-btn::before{transform:translateX(32px);background:#27272a}
  [data-theme="dark"] .theme-btn{background:#09090b;border-color:#27272a}
  /* 两个固定图标槽：左太阳、右月亮 */
  .theme-btn .tt-slot{
    position:relative;z-index:1;
    display:flex;align-items:center;justify-content:center;
    width:24px;height:24px;
  }
  .theme-btn .tt-sun{margin-right:auto}
  .theme-btn .tt-moon{margin-left:auto}
  .theme-btn .tt-slot svg{width:16px;height:16px;display:block;transition:color .3s ease}
  /* 浅色态：太阳在高亮圆上(深色描边)，月亮在外(较深) */
  .theme-btn .tt-sun svg{color:#3f3f46}
  .theme-btn .tt-moon svg{color:#a1a1aa}
  /* 深色态：月亮在高亮圆上(亮白)，太阳在外(暗淡) */
  [data-theme="dark"] .theme-btn .tt-sun svg{color:#71717a}
  [data-theme="dark"] .theme-btn .tt-moon svg{color:#ffffff}

  .globe-screen{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:clamp(8px,2vh,22px);
    /* 顶部留出品牌栏空间，避免标语/地球与“词旅”标题重叠 */
    padding:clamp(72px,11vh,104px) 16px 24px;
    box-sizing:border-box;overflow:hidden;
    transition:opacity .5s ease, transform .5s ease;
  }
  .globe-screen.hidden{opacity:0;transform:scale(.96);pointer-events:none}
  /* 标语回归正常文档流，地球被推到其下方，不再绝对定位重叠 */
  .tagline{flex:0 0 auto;text-align:center;z-index:5;padding:0 8px;pointer-events:none}
  .tagline h1{font-family:"Noto Serif SC",serif;font-weight:500;font-size:clamp(17px,4vw,27px);letter-spacing:.04em;line-height:1.5}
  .tagline p{
    font-family:"Cormorant Garamond",serif;font-style:italic;
    font-size:clamp(13px,3vw,16px);color:var(--ink-soft);margin-top:6px;letter-spacing:.04em;
  }
  /* 地球尺寸同时受宽度与可用高度约束，矮屏自动缩小、避免溢出与重叠 */
  .globe-wrap{position:relative;width:min(92vw,620px,58vh);aspect-ratio:1;flex:0 1 auto;min-height:0;touch-action:none}
  #cobe{width:100%;height:100%;display:block;cursor:grab;opacity:0;transition:opacity 1.2s ease;contain:layout paint size}
  #cobe:active{cursor:grabbing}
  .markers-layer{position:absolute;inset:0;pointer-events:none}

  /* emoji sticker floating ABOVE the blue dot — matches reference */
  .emoji-marker{
    position:absolute;
    transform:translate(-50%,-50%);   /* 中心对准坐标点，紧贴地球表面 */
    cursor:pointer;pointer-events:auto;line-height:1;user-select:none;
    filter:url(#sticker-outline) drop-shadow(0 2px 5px rgba(100,150,220,.38));
    transition:opacity .3s ease;
    will-change:transform,opacity;
  }
  .emoji-marker .glyph{
    display:block;
    /* 强制使用彩色 emoji 字体，避免 ⚽ 等被渲染成黑白镂空字形 */
    font-family:"Apple Color Emoji","Segoe UI Emoji","Segoe UI Symbol","Noto Color Emoji",sans-serif;
    animation:weather-float 3.4s ease-in-out infinite;
    transition:transform .18s ease;
  }
  .emoji-marker:hover .glyph{transform:scale(1.25)}
  .emoji-marker:hover .pin-label{opacity:1}
  @keyframes weather-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
  .pin-label{
    position:absolute;top:-40px;left:50%;transform:translateX(-50%);
    opacity:0;transition:opacity .2s ease;
    background:var(--ink);color:var(--paper);font-size:11px;
    padding:3px 9px;border-radius:20px;white-space:nowrap;
    font-family:"Noto Sans SC";letter-spacing:.04em;pointer-events:none;
    box-shadow:0 4px 12px var(--shadow);
  }
  .hint{
    position:absolute;bottom:26px;left:0;right:0;text-align:center;
    color:var(--ink-soft);font-size:12px;letter-spacing:.22em;z-index:5;
    text-transform:uppercase;pointer-events:none;animation:breathe 3.4s ease-in-out infinite;
  }
  @keyframes breathe{0%,100%{opacity:.45}50%{opacity:.9}}
  /* 矮屏（地球大、底部文字多、页面拥挤）时隐藏操作指引，避免重叠拥挤 */
  @media (max-height:760px){ .hint{display:none} }
  /* 地球底部：当前正对镜头国家的随机一句歌词 */
  .now-lyric{
    margin-top:0;max-width:min(86vw,560px);text-align:center;
    padding:0 20px;transition:opacity .5s ease;opacity:0;
    min-height:118px;flex:0 0 auto;
  }
  .now-lyric.show{opacity:1}
  .now-lyric .nl-head{
    display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;
  }
  .now-lyric .nl-emoji{font-size:20px;line-height:1;font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif}
  .now-lyric .nl-country{
    font-family:"Noto Sans SC";font-size:12px;letter-spacing:.18em;
    color:var(--ink-blue-soft);text-transform:none;
  }
  .now-lyric .nl-text{
    font-family:"Noto Serif SC",serif;font-weight:500;font-size:clamp(15px,3.6vw,18px);
    line-height:1.7;color:var(--ink-blue);letter-spacing:.02em;
  }
  .now-lyric .nl-text.latin{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:clamp(16px,3.8vw,20px)}
  .now-lyric .nl-trans{
    font-family:"Noto Sans SC";font-weight:300;font-size:13px;line-height:1.7;
    color:var(--ink-soft);margin-top:6px;
  }
  .now-lyric .nl-song{
    font-family:"Cormorant Garamond",serif;font-style:italic;font-size:13px;
    color:var(--ink-blue-soft);margin-top:8px;letter-spacing:.04em;
  }

  .region-screen{
    position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;
    background:
      radial-gradient(130% 100% at 50% 0%,
        color-mix(in srgb, var(--paper-card) 35%, var(--paper)) 0%,
        var(--paper-deep) 80%);
    transform:translateY(100%);transition:transform .55s cubic-bezier(.6,.01,.2,1);
  }
  .region-screen.show{transform:translateY(0)}
  .region-head{display:flex;align-items:center;gap:16px;padding:22px 24px 12px}
  .back-btn{
    cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);
    height:44px;padding:0 18px 0 14px;border-radius:30px;display:flex;align-items:center;gap:8px;
    font-size:14px;font-family:"Noto Sans SC";letter-spacing:.05em;
    box-shadow:0 4px 14px var(--shadow);transition:transform .2s ease;
  }
  .back-btn:hover{transform:translateX(-3px)}
  .back-btn svg{width:16px;height:16px}
  .region-title{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
  .region-title .big-emoji{font-size:38px;line-height:1;font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;filter:drop-shadow(0 3px 6px var(--shadow))}
  .region-title .meta{min-width:0}
  .region-title .country-row{display:flex;align-items:baseline;gap:10px;min-width:0;flex-wrap:wrap}
  .region-title .country{
    font-family:"Noto Serif SC",serif;font-weight:600;font-size:24px;letter-spacing:.04em;
    color:var(--ink);white-space:nowrap;flex:0 0 auto;
  }
  .region-title .subtitle{
    font-family:"Noto Serif SC",serif;font-weight:400;font-size:16px;letter-spacing:.06em;
    color:var(--ink-soft);position:relative;padding-left:12px;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;min-width:0;
  }
  .region-title .subtitle::before{
    content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);
    width:1px;height:13px;background:var(--line);
  }
  .region-title .sub{font-family:"Noto Serif SC",serif;color:var(--ink-soft);font-size:13px;letter-spacing:.1em;margin-top:5px}
  .region-title .sub b{color:var(--ink-soft);font-weight:600;font-size:13px}

  /* 线性横滑舞台：卡片一排铺开，整排平移 */
  .carousel{
    position:relative;flex:1;width:100%;overflow:hidden;
    display:block;touch-action:pan-y;cursor:grab;user-select:none;
  }
  .carousel:active{cursor:grabbing}
  .lyric-card{
    position:absolute;left:50%;top:50%;
    width:var(--card-size,360px);height:var(--card-h,440px);
    background:var(--paper-card);
    /* 细微纸纹：叠加极淡噪点感的双层渐变 */
    background-image:
      radial-gradient(rgba(120,110,90,.05) 1px, transparent 1px),
      radial-gradient(rgba(120,110,90,.04) 1px, transparent 1px);
    background-size:5px 5px, 7px 7px;
    background-position:0 0, 2px 3px;
    border-radius:6px;
    padding:42px 38px 34px;display:flex;flex-direction:column;
    cursor:pointer;overflow:hidden;
    box-shadow:0 16px 44px -24px rgba(40,40,60,.4);
    will-change:transform,opacity;
    /* transform/opacity 过渡由 JS 动态设置（拖拽时关闭），此处只过渡背景与阴影 */
    transition:box-shadow .45s ease, background-color .4s ease;
  }
  .lyric-card.is-center{
    cursor:default;
    background-color:var(--paper-card-hi);
    box-shadow:0 26px 70px -22px rgba(40,40,60,.4);
  }
  .lyric-card .quote{font-family:"Cormorant Garamond",serif;font-size:74px;line-height:.6;color:var(--ink-blue);opacity:.32;height:30px}
  .lyric-card .lyric{font-family:"Noto Serif SC",serif;font-weight:500;font-size:24px;line-height:1.75;letter-spacing:.03em;margin-top:16px;color:var(--ink-blue)}
  .lyric-card .lyric.latin{font-family:"Cormorant Garamond",serif;font-size:28px;font-weight:500;line-height:1.55;letter-spacing:.01em}
  .lyric-card .trans{
    font-family:"Noto Serif SC",serif;font-weight:400;font-size:15px;line-height:1.8;color:var(--ink-blue-soft);
    margin-top:16px;padding-top:14px;border-top:1px solid color-mix(in srgb, var(--ink-blue) 18%, transparent);
  }
  .lyric-card .grow{flex:1}
  .lyric-card .foot{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-top:18px}
  .lyric-card .song{min-width:0}
  .lyric-card .song .name{font-family:"Noto Serif SC",serif;font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink-blue)}
  .lyric-card .song .artist{font-size:13px;color:var(--ink-blue-soft);margin-top:3px}
  .lyric-card .song .lang{display:inline-block;margin-top:8px;font-size:11px;letter-spacing:.08em;color:var(--ink-blue);border:1px solid color-mix(in srgb, var(--ink-blue) 30%, transparent);padding:2px 9px;border-radius:3px}
  .play-btn{
    flex:0 0 auto;width:48px;height:48px;border-radius:50%;cursor:pointer;
    border:1.5px solid var(--ink-blue);background:transparent;color:var(--ink-blue);
    display:grid;place-items:center;
    transition:transform .2s ease, opacity .3s ease, background .25s ease, color .25s ease;
  }
  .play-btn:hover{transform:scale(1.08);background:var(--ink-blue);color:var(--paper-card-hi)}
  .play-btn:active{transform:scale(.94)}
  .play-btn svg{width:19px;height:19px;margin-left:2px}
  /* 非中心卡的播放按钮隐藏，避免误触 */
  .lyric-card:not(.is-center) .play-btn{opacity:0;pointer-events:none}
  .card-index{position:absolute;top:26px;right:32px;font-family:"Cormorant Garamond",serif;font-style:italic;font-size:14px;color:var(--ink-blue-soft);opacity:.7;letter-spacing:.05em}
  /* 左右切换按钮 */
  .nav-arrows{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);display:flex;gap:14px;z-index:200}
  .nav-btn{
    width:52px;height:52px;border-radius:50%;cursor:pointer;
    border:1px solid var(--line);background:var(--card);color:var(--ink);
    display:grid;place-items:center;box-shadow:0 6px 18px var(--shadow);
    transition:transform .2s ease, background .3s ease, color .3s ease;
  }
  .nav-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:scale(1.06)}
  .nav-btn:active{transform:scale(.94)}
  .nav-btn svg{width:22px;height:22px}
  .swipe-hint{text-align:center;color:var(--ink-soft);font-size:11px;letter-spacing:.24em;text-transform:uppercase;padding-bottom:16px;pointer-events:none}
  .toast{
    position:fixed;left:50%;bottom:40px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);padding:11px 20px;border-radius:30px;
    font-size:13px;letter-spacing:.04em;opacity:0;pointer-events:none;z-index:99;
    transition:opacity .3s ease, transform .3s ease;box-shadow:0 8px 24px var(--shadow);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* ===== 开屏页 ===== */
  .splash{
    position:fixed;inset:0;z-index:100;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(130% 100% at 50% 0%,
      color-mix(in srgb, var(--paper-card) 30%, var(--paper)) 0%, var(--paper-deep) 80%);
    transition:opacity .8s ease, visibility .8s ease;
  }
  .splash.hide{opacity:0;visibility:hidden;pointer-events:none}
  .splash-inner{
    width:min(92vw,1000px);padding:0 24px;
    display:flex;flex-direction:column;gap:48px;position:relative;
  }
  .splash-brand{
    display:flex;align-items:baseline;gap:14px;
    animation:splashFade .9s ease both;
  }
  .splash-brand .zh{font-family:"Noto Serif SC",serif;font-weight:700;font-size:24px;letter-spacing:.2em;color:var(--ink)}
  .splash-brand .en{
    font-family:"Cormorant Garamond",serif;font-style:italic;font-size:14px;
    letter-spacing:.32em;color:var(--ink-soft);text-transform:uppercase;
  }
  .splash-line{
    display:flex;flex-direction:column;align-items:flex-start;gap:6px 0;
    animation:splashFade 1s ease .15s both;
  }
  .splash-q{
    font-family:"Noto Serif SC",serif;font-weight:600;
    font-size:clamp(30px,6.5vw,64px);letter-spacing:.04em;color:var(--ink);
    line-height:1.3;
  }
  .splash-a{
    display:inline-flex;align-items:baseline;white-space:nowrap;
    font-family:"Noto Serif SC",serif;font-weight:600;
    font-size:clamp(30px,6.5vw,64px);letter-spacing:.04em;color:var(--ink-blue);
    line-height:1.3;min-height:1.3em;
  }
  .tw-cursor{
    display:inline-block;margin-left:4px;color:var(--ink-blue);
    font-weight:400;animation:twBlink 1s steps(1) infinite;
  }
  @keyframes twBlink{0%,50%{opacity:1}50.01%,100%{opacity:0}}
  /* 开始旅程按钮：左侧圆形，悬停展开填满，文字反色（仿 motion-button） */
  .splash-enter{
    align-self:flex-start;margin-top:8px;position:relative;
    width:200px;height:56px;padding:4px;cursor:pointer;
    border:none;border-radius:40px;outline:none;
    background:transparent;
    animation:splashFade 1s ease .4s both;
  }
  .splash-enter .se-circle{
    display:block;height:48px;width:48px;margin:0;
    border-radius:40px;background:var(--ink-blue);
    box-shadow:0 8px 22px -6px color-mix(in srgb, var(--ink-blue) 60%, transparent);
    transition:width .5s cubic-bezier(.65,0,.35,1);
  }
  .splash-enter:hover .se-circle{width:100%}
  .splash-enter .se-icon{
    position:absolute;top:50%;left:16px;transform:translateY(-50%);
    display:grid;place-items:center;
    transition:transform .5s cubic-bezier(.65,0,.35,1);
  }
  .splash-enter:hover .se-icon{transform:translate(6px,-50%)}
  .splash-enter .se-icon svg{width:22px;height:22px;color:#fff}
  .splash-enter .se-text{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);margin-left:14px;
    font-family:"Noto Sans SC";font-size:16px;font-weight:500;letter-spacing:.08em;
    white-space:nowrap;color:var(--ink);
    transition:color .5s ease;
  }
  .splash-enter:hover .se-text{color:#fff}
  @keyframes splashFade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  @media (max-width:520px){
    .splash-inner{gap:32px}
    .splash-a{min-height:1.4em}
    .region-title .country{font-size:20px}
    .region-title .subtitle{font-size:13px;padding-left:9px}
    .region-head{gap:10px;padding:18px 16px 10px}
    .region-title{gap:10px}
    .region-title .big-emoji{font-size:30px}
    .back-btn{padding:0 12px;font-size:13px}
  }
  @media (prefers-reduced-motion:reduce){*{transition-duration:.01ms !important;animation-duration:.01ms !important}}
  /* 矮屏：收紧头部与卡片内边距、缩短歌词行距，减少为放下卡片所需的等比缩小 */
  @media (max-height:720px){
    .region-head{padding:14px 18px 8px}
    .region-title .big-emoji{font-size:30px}
    .lyric-card{padding:30px 30px 26px}
    .lyric-card .lyric{font-size:21px;line-height:1.6;margin-top:12px}
    .lyric-card .lyric.latin{font-size:24px;line-height:1.45}

// ===== 开屏页打字机 =====
(function(){
  const answers = ["⛷️追逐","🎧聆听","🗺️丈量地理","🏛️探索文明","发现地球村🌍的交响乐章"];
  const elText = document.getElementById('twText');
  const elCursor = document.getElementById('twCursor');
  const splash = document.getElementById('splash');
  const enterBtn = document.getElementById('splashEnter');
  if(!elText || !splash) return;

  const DELETE=30, INIT=500;
  // 前四个词打字更快(40ms)，最后一句较长稍慢(65ms)
  function typeSpeed(idx){ return idx<4 ? 40 : 65; }
  // 前四个词停留短(650ms)，最后一个词停留久(2200ms)后再循环
  function waitTime(idx){ return idx<4 ? 650 : 2200; }
  let ti=0, ci=0, deleting=false, timer=null, stopped=false;
  // 按字素簇切分（emoji + 变体选择符算一个单位），优先用 Intl.Segmenter
  const _seg = (typeof Intl!=='undefined' && Intl.Segmenter) ? new Intl.Segmenter('zh',{granularity:'grapheme'}) : null;
  function graphemes(str){
    if(_seg) return Array.from(_seg.segment(str), s=>s.segment);
    return Array.from(str);   // 回退
  }

  function tick(){
    if(stopped) return;
    const chars=graphemes(answers[ti]);   // 字素切分，🗺️ 等不被拆碎
    const len=chars.length;
    if(!deleting){
      if(ci<len){
        elText.textContent=chars.slice(0,++ci).join('');
        timer=setTimeout(tick, typeSpeed(ti));
      }else{
        timer=setTimeout(()=>{ deleting=true; tick(); }, waitTime(ti));
      }
    }else{
      if(ci>0){
        elText.textContent=chars.slice(0,--ci).join('');
        timer=setTimeout(tick, DELETE);
      }else{
        deleting=false;
        ti=(ti+1)%answers.length;
        timer=setTimeout(tick, 220);
      }
    }
  }
  timer=setTimeout(tick, INIT);

  function enter(){
    if(stopped) return; stopped=true;
    clearTimeout(timer);
    splash.classList.add('hide');
    // 动画结束后彻底移除，避免遮挡
    setTimeout(()=>{ splash.style.display='none'; }, 850);
  }
  enterBtn && enterBtn.addEventListener('click', enter);
})();
</script>

  async function loadCobe(){
    const sources = [
      'https://esm.sh/cobe@0.6.3',
      'https://cdn.skypack.dev/cobe@0.6.3',
      'https://esm.run/cobe@0.6.3'
    ];
    for(const url of sources){
      try{
        const mod = await import(/* @vite-ignore */ url);
        const fn = mod.default || mod.createGlobe || mod;
        if(typeof fn === 'function'){ window.createGlobe = fn; return true; }
      }catch(e){ /* try next */ }
    }
    return false;
  }
  loadCobe().then(ok=>{
    if(ok){ window.__startApp && window.__startApp(); }
    else {
      const w=document.getElementById('globeWrap');
      if(w){ w.innerHTML='<div style="display:grid;place-items:center;height:100%;color:var(--ink-soft);font-size:14px;text-align:center;padding:20px;line-height:1.8">地球组件加载失败，请检查网络连接后刷新。<br><span style="font-size:12px;opacity:.7">cobe failed to load</span></div>'; }
    }
  });
</script>
<script>
window.__startApp = function(){
  const wrap=document.getElementById('globeWrap');
  const canvas=document.getElementById('cobe');
  const layer=document.getElementById('markersLayer');
  const globeScreen=document.getElementById('globeScreen');
  const regionScreen=document.getElementById('regionScreen');
  const toastEl=document.getElementById('toast');

  let phi=0, dragPhi=0, curTheta=0.18, dragTheta=0;
  let pointer=null, isDragging=false;
  let curPhiTotal=0, curThetaTotal=0.18;
  const SPEED=0.0016;

  // 统一计算当前旋转角（自转 + 拖拽），地球渲染和图标投影共用同一份，保证同步
  function syncAngles(){
    curPhiTotal = phi + dragPhi;
    curThetaTotal = Math.max(-0.6, Math.min(0.6, curTheta + dragTheta));
  }

  const markerEls=MARKERS.map(m=>{
    const el=document.createElement('div');
    el.className='emoji-marker';
    el.innerHTML='<span class="glyph">'+m.emoji+'</span><span class="pin-label">'+m.country+'</span>';
    el.addEventListener('click',e=>{e.stopPropagation(); if(!justDragged) openRegion(m);});
    layer.appendChild(el);
    return el;
  });

  const themeBtn=document.getElementById('themeBtn');
  const themeBtn2=document.getElementById('themeBtn2');
  let dark=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;
  function applyTheme(){
    document.documentElement.setAttribute('data-theme',dark?'dark':'light');
    themeBtn.setAttribute('aria-checked',dark?'true':'false');
    if(themeBtn2) themeBtn2.setAttribute('aria-checked',dark?'true':'false');
    rebuildGlobe();
  }
  themeBtn.addEventListener('click',()=>{dark=!dark;applyTheme();});
  if(themeBtn2) themeBtn2.addEventListener('click',()=>{dark=!dark;applyTheme();});

  let globe=null;
  function makeGlobe(){
    const w=Math.min(wrap.clientWidth, wrap.clientHeight||wrap.clientWidth); if(!w) return;
    const dpr=Math.min(window.devicePixelRatio||1,2);
    // light dotted globe like the reference; markerColor = the small blue dots
    const base   = dark?[0.20,0.24,0.32]:[0.98,0.98,1.0];
    const marker = dark?[0.45,0.62,0.92]:[0.40,0.70,0.95];
    const glow   = dark?[0.04,0.06,0.10]:[0.94,0.93,0.91];
    globe=window.createGlobe(canvas,{
      devicePixelRatio:dpr, width:w*dpr, height:w*dpr,
      phi:0, theta:0.18, dark:dark?1:0, diffuse:1.5,
      mapSamples:16000, mapBrightness:dark?7:10,
      baseColor:base, markerColor:marker, glowColor:glow,
      markerElevation:0.12, opacity:0.85,
      markers:MARKERS.map(m=>({location:[m.lat,m.lng], size:0.025})),
      onRender:(state)=>{
        if(!isDragging) phi+=SPEED;
        // 角度由 syncAngles() 统一计算（图标与地球共用），这里只负责把值交给 cobe
        syncAngles();
        state.phi=curPhiTotal; state.theta=curThetaTotal;
      }
    });
    setTimeout(()=>canvas.style.opacity='1',60);
  }
  function rebuildGlobe(){ if(globe){globe.destroy();globe=null;canvas.style.opacity='0';} makeGlobe(); }

  // 严格采用 cobe 内部投影公式（与它渲染大陆用的完全一致，保证图标贴合大陆）：
  //   latR = lat·π/180,  lonR = lng·π/180 − π   （−π 是 cobe 固有部分，不可改）
  //   p = ( −cosLat·cos(lonR),  sin(latR),  cosLat·sin(lonR) )
  //   再绕 Y 轴旋转 phi（与 cobe state.phi 同号），绕 X 轴旋转 theta
  // emoji 落点半径 / 容器半径。cobe 地球本体小于容器（四周是 glow 光晕），
  // 用 1.0 会让靠边缘的 emoji 飞出球外。若 emoji 偏外调小、偏内调大。
  const GLOBE_R = 0.66;       // 蓝点贴大陆用的半径
  // emoji 在蓝点基础上沿径向外探，外探量 ∝ rho²（中心几乎不动，越靠边缘探得越远）。
  // 这样正面国家的 emoji 仍贴着大陆，转到边缘的 emoji 会探出地球轮廓、浮在球外（仿图2），
  // 不再“沉进海里”。
  const EMOJI_OUT = 0.34;
  function project(lat,lng){
    const cw=wrap.clientWidth, ch=wrap.clientHeight;
    const D=Math.min(cw, ch||cw);
    const R=D/2;
    const cxScreen=cw/2, cyScreen=ch/2;
    const latR=lat*Math.PI/180;
    const lonR=lng*Math.PI/180 - Math.PI;
    const cosLat=Math.cos(latR);
    const px=-cosLat*Math.cos(lonR);
    const py= Math.sin(latR);
    const pz= cosLat*Math.sin(lonR);
    const cy=Math.cos(curPhiTotal), sy=Math.sin(curPhiTotal);
    let x =  cy*px + sy*pz;
    let z = -sy*px + cy*pz;
    let y =  py;
    const cx=Math.cos(curThetaTotal), sx=Math.sin(curThetaTotal);
    const y2 = cx*y - sx*z;
    const z2 = sx*y + cx*z;
    y=y2; z=z2;
    const dotX = cxScreen + x*R*GLOBE_R;
    const dotY = cyScreen - y*R*GLOBE_R;
    // 径向外探：量 ∝ rho²，中心≈0、边缘最大
    const rho = Math.hypot(x, y);                 // 0(中心)..1(边缘)
    const out = R*EMOJI_OUT*rho*rho;              // 外探距离(px)，rho²让中心更稳
    const dirX = rho>1e-4 ? x/rho : 0;
    const dirY = rho>1e-4 ? -y/rho : 0;
    const emojiX = dotX + dirX*out;
    const emojiY = dotY + dirY*out;
    return {
      x:emojiX, y:emojiY,
      dotX, dotY,
      visible:z>0.02,
      scale:0.82+0.30*Math.max(0,z), z
    };
  }

  function tick(){
    syncAngles();   // 先取最新旋转角，确保拖拽时图标与地球同步
    let topIdx=-1, topZ=-2;
    for(let i=0;i<MARKERS.length;i++){
      const m=MARKERS[i], el=markerEls[i], p=project(m.lat,m.lng);
      if(p.visible){
        el.style.opacity='1';
        el.style.left=p.x+'px';
        el.style.top=p.y+'px';                 // 中心对准坐标点，不再上抬
        el.style.fontSize=(38*p.scale)+'px';    // 放大图标
        el.style.zIndex=String(Math.round(p.z*100));
        el.style.pointerEvents='auto';
      }else{ el.style.opacity='0'; el.style.pointerEvents='none'; }
      if(p.z>topZ){ topZ=p.z; topIdx=i; }   // 记录最正对镜头的国家
    }
    updateNowLyric(topIdx, topZ);
    requestAnimationFrame(tick);
  }

  // 底部歌词：显示当前正对镜头国家的随机一句，切换国家时才换
  let curCenterIdx=-1, nlEls=null;
  function updateNowLyric(idx, z){
    if(!nlEls){
      nlEls={
        box:document.getElementById('nowLyric'),
        emoji:document.getElementById('nlEmoji'),
        country:document.getElementById('nlCountry'),
        text:document.getElementById('nlText'),
        trans:document.getElementById('nlTrans'),
        song:document.getElementById('nlSong')
      };
    }
    // z 太小说明没有国家正对镜头（如正好转到海洋），淡出
    if(idx<0 || z<0.25){
      if(curCenterIdx!==-1){ curCenterIdx=-1; nlEls.box.classList.remove('show'); }
      return;
    }
    if(idx===curCenterIdx) return;   // 还是同一个国家，不变
    // 迟滞：新国家需明显更正对（z 更高一截）才切换，避免临界抖动
    if(curCenterIdx>=0){
      const curM=MARKERS[curCenterIdx];
      const curP=project(curM.lat,curM.lng);
      if(curP.z>0.2 && z < curP.z+0.08) return;
    }
    curCenterIdx=idx;
    const m=MARKERS[idx];
    const s=m.songs[Math.floor(Math.random()*m.songs.length)];  // 随机一句
    const latin=!['普通话','粤语','日语','韩语'].includes(s.language);
    const showTrans=s.lyricCn&&s.lyricCn.trim()&&s.lyricCn.trim()!==s.lyric.trim();
    // 淡出→换内容→淡入
    nlEls.box.classList.remove('show');
    clearTimeout(updateNowLyric._t);
    updateNowLyric._t=setTimeout(()=>{
      nlEls.emoji.textContent=m.emoji;
      nlEls.country.textContent=m.country;
      nlEls.text.textContent='“'+s.lyric+'”';
      nlEls.text.className='nl-text'+(latin?' latin':'');
      nlEls.trans.textContent=showTrans?s.lyricCn:'';
      nlEls.song.textContent='——《'+s.songName+'》 '+s.singer;
      nlEls.box.classList.add('show');
    },180);
  }

  let justDragged=false, moved=0;
  canvas.addEventListener('pointerdown',e=>{
    isDragging=true; pointer={x:e.clientX,y:e.clientY}; moved=0;
    canvas.setPointerCapture(e.pointerId);
  });
  window.addEventListener('pointermove',e=>{
    if(!isDragging||!pointer) return;
    const dx=e.clientX-pointer.x, dy=e.clientY-pointer.y;
    moved+=Math.abs(dx)+Math.abs(dy);
    dragPhi+=dx/180;
    curTheta=Math.max(-0.55,Math.min(0.55,curTheta+dy/400));
    pointer={x:e.clientX,y:e.clientY};
  });
  window.addEventListener('pointerup',()=>{
    if(isDragging){ phi+=dragPhi; dragPhi=0; justDragged=moved>6; setTimeout(()=>justDragged=false,60); }
    isDragging=false; pointer=null;
  });

  const carousel=document.getElementById('carousel');
  const navArrows=carousel.querySelector('.nav-arrows');
  function langClass(lang){ return ['普通话','粤语','台语','日语','韩语'].includes(lang)?'':'latin'; }
  function playLink(s){ return 'https://y.qq.com/n/ryqq/search?w='+encodeURIComponent(s.songName+' '+s.singer)+'&t=song'; }

  // 线性横滑状态
  let cardData=[];      // 当前国家的歌曲
  let cardEls=[];       // 卡片 DOM，顺序与 cardData 一致
  let activeIndex=0;    // 当前居中卡的索引
  let dragDX=0;         // 拖拽中的实时位移(px)，用于跟手
  let cardSize=360, cardH=440, fitScale=1;

  // 测量当前中心卡内容实际所需高度（含 padding），用于避免文字被裁切
  function measureContentH(){
    let max=0;
    cardEls.forEach(el=>{
      // scrollHeight 反映内容真实高度；取所有卡中的最大值，保证统一尺寸下都不裁切
      const h=el.scrollHeight;
      if(h>max) max=h;
    });
    return max;
  }

  function computeCardSize(){
    const vw = window.innerWidth, vh=window.innerHeight;
    const wide = window.matchMedia('(min-width:640px)').matches;
    // 卡片宽度固定，保证内部排版恒定
    cardSize = wide ? 380 : 360;

    // 卡片高度：先给一个基于视口的基准，再根据内容实际高度向上撑开，
    // 这样长歌词不会因固定高度 + overflow:hidden 被裁掉底部（歌名/播放键）。
    const baseH = Math.max(380, vh*0.56);
    const contentH = measureContentH();           // 0 表示卡片尚未渲染
    cardH = Math.max(baseH, contentH || 0);

    carousel.style.setProperty('--card-size', cardSize+'px');
    carousel.style.setProperty('--card-h', cardH+'px');

    // 整张卡片等比缩放，使其在“横向露出相邻卡”与“纵向可用高度”内都放得下，
    // 只缩小不放大。纵向可用空间用 carousel 的真实高度（已扣除头部与提示）。
    const needW = cardSize * 1.18;                 // 中心卡 + 两侧露出部分占宽
    const availW = vw - 24;                         // 减去最小边距
    const availH = (carousel.clientHeight || vh*0.62) - 16; // 真实可用高度，留 8px 余量
    const sW = availW / needW;
    const sH = availH / cardH;
    fitScale = Math.min(1, sW, sH);
  }

  function buildCard(s, idx, total){
    const card=document.createElement('div');card.className='lyric-card';
    const showTrans=s.lyricCn&&s.lyricCn.trim()&&s.lyricCn.trim()!==s.lyric.trim();
    card.innerHTML=
      '<div class="card-index">'+String(idx+1).padStart(2,'0')+' / '+String(total).padStart(2,'0')+'</div>'+
      '<div class="quote">&ldquo;</div>'+
      '<div class="lyric '+langClass(s.language)+'">'+esc(s.lyric)+'</div>'+
      (showTrans?'<div class="trans">'+esc(s.lyricCn)+'</div>':'')+
      '<div class="grow"></div>'+
      '<div class="foot"><div class="song">'+
        '<div class="name">'+esc(s.songName)+'</div>'+
        '<div class="artist">'+esc(s.singer)+'</div>'+
        '<span class="lang">'+esc(s.language)+'</span>'+
      '</div>'+
      '<button class="play-btn" title="去 QQ 音乐搜索播放"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>'+
      '</div>';
    card.querySelector('.play-btn').addEventListener('click',e=>{
      e.stopPropagation(); window.open(playLink(s),'_blank','noopener');
      showToast('正在前往 QQ 音乐搜索 · '+s.songName);
    });
    return card;
  }

  // 线性排布：每张卡按 (i - activeIndex) 横向铺开，整排跟随平移
  // dragging=true 时关闭过渡，跟手实时移动
  function layout(dragging){
    const stepX=cardSize*0.82*fitScale;  // 相邻卡间距（随整体缩放）
    const offset=dragDX/(cardSize*fitScale); // 拖拽折算成“格”的偏移
    cardEls.forEach((el,i)=>{
      const pos=(i-activeIndex) - offset; // 距中心的位置（含拖拽实时偏移）
      const dist=Math.abs(pos);
      const isCenter=dist<0.5;
      const tx=stepX*pos;
      const scale=Math.max(0.86, 1-dist*0.07)*fitScale; // 叠加整体缩放
      const ty=isCenter ? 0 : 6;          // 非中心略微下沉
      el.style.transition = dragging ? 'none' : 'transform .45s cubic-bezier(.25,.8,.3,1), opacity .45s ease, box-shadow .45s ease';
      el.style.transform='translate(-50%,-50%) translateX('+tx+'px) translateY('+ty+'px) scale('+scale+')';
      el.classList.toggle('is-center', isCenter);
      el.style.opacity = String(Math.max(0, 1 - dist*0.32));
      el.style.zIndex = String(100 - Math.round(dist*10));
      el.style.pointerEvents = dist<2.5 ? 'auto' : 'none';
    });
  }

  function goTo(idx, dragging){
    activeIndex=Math.max(0, Math.min(cardData.length-1, idx));  // 不循环，到头即停
    layout(dragging);
    updateArrows();
  }
  function handleMove(steps){ goTo(activeIndex+steps, false); }

  // 到头时禁用对应箭头
  function updateArrows(){
    const prev=document.getElementById('prevBtn'), next=document.getElementById('nextBtn');
    const atStart=activeIndex<=0, atEnd=activeIndex>=cardData.length-1;
    prev.style.opacity=atStart?'.35':'1'; prev.style.pointerEvents=atStart?'none':'auto';
    next.style.opacity=atEnd?'.35':'1';   next.style.pointerEvents=atEnd?'none':'auto';
  }

  function openRegion(m){
    document.getElementById('rEmoji').textContent=m.emoji;
    document.getElementById('rCountry').textContent=m.country;
    document.getElementById('rSubtitle').textContent=m.subtitle||'';
    document.getElementById('rArea').textContent=m.area;
    document.getElementById('rCount').textContent=m.songs.length+' 首';

    cardEls.forEach(el=>el.remove());
    cardData=m.songs.slice();
    cardEls=[]; activeIndex=0; dragDX=0;
    computeCardSize();
    cardData.forEach((s,idx)=>{
      const el=buildCard(s, idx, cardData.length);
      el.addEventListener('click',()=>{ if(!dragMoved && idx!==activeIndex) goTo(idx,false); });
      carousel.insertBefore(el, navArrows);
      cardEls.push(el);
    });
    // 卡片渲染后再测量一次内容高度，撑开卡片并据此重算缩放，避免裁切
    requestAnimationFrame(()=>{ computeCardSize(); layout(false); });
    goTo(0,false);

    regionScreen.classList.add('show'); globeScreen.classList.add('hidden');
    document.body.classList.add('region-open');
  }

  document.getElementById('prevBtn').addEventListener('click',()=>handleMove(-1));
  document.getElementById('nextBtn').addEventListener('click',()=>handleMove(1));
  window.addEventListener('keydown',e=>{
    if(!document.body.classList.contains('region-open')) return;
    if(e.key==='ArrowLeft') handleMove(-1);
    else if(e.key==='ArrowRight') handleMove(1);
  });

  // 鼠标 / 触摸 横向拖滑：跟手平移，松手吸附到最近一格
  let dragStartX=null, dragMoved=false;
  function dragStart(x){ dragStartX=x; dragDX=0; dragMoved=false; }
  function dragMove(x){
    if(dragStartX===null) return;
    dragDX=x-dragStartX;
    if(Math.abs(dragDX)>4) dragMoved=true;
    layout(true);   // 跟手实时移动（无过渡）
  }
  function dragEnd(){
    if(dragStartX===null) return;
    // 拖动超过卡宽的 22% 即翻页，否则回弹
    const moved=-dragDX/(cardSize*fitScale);
    let target=activeIndex + (moved>0.22?1 : moved<-0.22?-1 : 0);
    dragStartX=null; dragDX=0;
    goTo(target,false);
    setTimeout(()=>{dragMoved=false;},0);
  }
  carousel.addEventListener('pointerdown',e=>{ if(e.target.closest('.nav-btn')||e.target.closest('.play-btn')) return; dragStart(e.clientX); });
  window.addEventListener('pointermove',e=>{ if(dragStartX!==null) dragMove(e.clientX); });
  window.addEventListener('pointerup',dragEnd);
  carousel.addEventListener('touchstart',e=>{ dragStart(e.touches[0].clientX); },{passive:true});
  carousel.addEventListener('touchmove',e=>{ dragMove(e.touches[0].clientX); },{passive:true});
  carousel.addEventListener('touchend',dragEnd,{passive:true});

  // 鼠标滚轮 / 触控板横向滚动切换：横滑用 deltaX，竖滚鼠标用 deltaY 也可横切
  let wheelAccum=0, wheelLock=false, wheelStopTimer=null;
  carousel.addEventListener('wheel',e=>{
    if(!document.body.classList.contains('region-open')) return;
    const d = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
    if(d===0) return;
    e.preventDefault();           // 拦截页面滚动，转为卡片横切

    // 只要还在收到 wheel 事件，就把“解锁”推迟到滚动彻底停止 150ms 之后。
    // 触控板一次滑动会持续发送惯性事件（可达 1~2 秒），这样能保证一次滑动只翻一格。
    clearTimeout(wheelStopTimer);
    wheelStopTimer=setTimeout(()=>{ wheelLock=false; wheelAccum=0; }, 150);

    if(wheelLock) return;          // 已翻过且滚动尚未停止 → 忽略后续惯性
    wheelAccum += d;
    if(Math.abs(wheelAccum) > 40){
      handleMove(wheelAccum>0 ? 1 : -1);
      wheelAccum = 0;
      wheelLock = true;            // 翻一格后锁定，直到滚动停止才解锁
    }
  }, {passive:false});

  window.addEventListener('resize',()=>{ if(cardData.length){ computeCardSize(); layout(false); } });

  document.getElementById('backBtn').addEventListener('click',()=>{
    regionScreen.classList.remove('show'); globeScreen.classList.remove('hidden');
    document.body.classList.remove('region-open');
  });
  function showToast(msg){
    toastEl.textContent=msg; toastEl.classList.add('show');
    clearTimeout(showToast._t); showToast._t=setTimeout(()=>toastEl.classList.remove('show'),2200);
  }
  function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

  // robust init: keep trying until the wrap has a real width, then build the globe
  function ensureGlobe(tries){
    if(globe) return;
    if(wrap.clientWidth>0){ makeGlobe(); return; }
    if(tries>0) requestAnimationFrame(()=>ensureGlobe(tries-1));
  }
  applyTheme();              // sets theme + attempts a build
  const ro=new ResizeObserver(()=>{ if(wrap.clientWidth>0&&!globe) makeGlobe(); });
  ro.observe(wrap);
  ensureGlobe(120);          // ~2s of rAF retries as a safety net
  tick();
  let _rt; window.addEventListener('resize',()=>{ clearTimeout(_rt); _rt=setTimeout(rebuildGlobe,150); });
};
</script>
</body>
</html>
